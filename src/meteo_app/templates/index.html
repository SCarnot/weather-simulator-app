<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulateur météo</title>
</head>
<body>
    <h1>Simulateur météo</h1>
    <p>Bienvenue sur le simulateur météo climatique.</p>

    <form action="/resultats" method="POST">
        <label for="lieu">Lieu :</label>
        <input type="text" id="lieu" name="lieu" placeholder="Ex : Pontarlier" required>
        <br><br>

        <label for="date_debut">Date de début :</label>
        <input type="date" id="date_debut" name="date_debut" min="1950-01-01" max="2050-12-31" required>
        <br><br>

        <label for="date_fin">Date de fin :</label>
        <input type="date" id="date_fin" name="date_fin" min="1950-01-01" max="2050-12-31" required>
        <br><br>

        <button type="submit">Voir la météo</button>
    </form>
</body>
</html>
